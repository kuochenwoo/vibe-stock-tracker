interface:
  display_name: "Change Delivery Workflow"
  short_description: "Maintain changelog, Postman, and todo artifacts with batched changelog updates."
  default_prompt: "Use this skill when finishing repository changes that require daily changelog, Postman, and roadmap maintenance, batching minor tweaks into larger changelog entries when appropriate, capturing unimplemented ideas in TODO-LIST.md with explicit implementation status, using grouped FEAT and FIX labels, keeping one changelog file per day under month folders, and leaving final verification and git operations to the user."
